name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *" # 每天凌晨3点自动同步
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/qianqi32/SafeRelay.git || true
          git fetch upstream

          # 同步 main 分支
          git checkout main
          git reset --hard upstream/main
          git push origin main --force

      - name: Sync success notification
        if: success()
        run: |
          echo "✅ 同步上游成功！"
          echo "Cloudflare 将自动重新部署 Worker"
